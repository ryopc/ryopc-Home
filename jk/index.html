<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>アルティメットじゃんけん</title>
    <style>
      :root {
        --bg: #0f172a;
        --card: #1e293b;
        --text: #f1f5f9;
        --muted: #94a3b8;
        --accent: #f59e0b;
        --p1: #3b82f6;
        --p2: #ef4444;
        --green: #10b981;
        --border: #334155;
        --pri: #6366f1;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Hiragino Kaku Gothic Pro", "Meiryo", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100dvh;
        transition: background 0.25s;
      }
      header {
        background: linear-gradient(135deg, #1e1b4b, #312e81);
        padding: 0.85rem 1rem;
        display: flex;
        align-items: center;
        gap: 0.7rem;
        position: sticky;
        top: 0;
        z-index: 10;
        transition: background 0.25s;
      }
      header h1 {
        font-size: 1.05rem;
        font-weight: 900;
        flex: 1;
      }
      .badge {
        font-size: 0.68rem;
        background: var(--accent);
        color: #000;
        padding: 0.15rem 0.5rem;
        border-radius: 999px;
        font-weight: 800;
      }

      /* 画面切り替え（ホーム画面 / 対戦画面） */
      body.screen-battle {
        background: #1a0f0f;
      }
      body.screen-battle header {
        background: linear-gradient(135deg, #450a0a, #7f1d1d);
      }
      body.screen-battle .badge {
        background: var(--p2);
        color: #fff;
      }
      #home-screen,
      #battle-screen {
        animation: fadein 0.2s ease-out;
      }

      .container {
        max-width: 540px;
        margin: 0 auto;
        padding: 1rem;
      }
      .section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .section-title {
        font-size: 0.95rem;
        font-weight: 800;
        margin-bottom: 0.6rem;
        color: var(--accent);
      }

      input {
        border: 2px solid var(--border);
        border-radius: 10px;
        padding: 0.5rem 0.6rem;
        font-size: 0.88rem;
        font-family: inherit;
        background: #0f172a;
        color: var(--text);
        width: 100%;
      }
      input:focus {
        border-color: var(--pri);
        outline: none;
      }
      .input-full {
        margin-bottom: 0.4rem;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 0.55rem 1rem;
        font-size: 0.88rem;
        font-weight: 700;
        font-family: inherit;
        cursor: pointer;
        transition: all 0.1s;
      }
      button:active {
        transform: scale(0.97);
      }
      button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .btn-pri {
        background: var(--pri);
        color: #fff;
        width: 100%;
      }
      .btn-accent {
        background: var(--accent);
        color: #000;
      }
      .btn-danger {
        background: var(--p2);
        color: #fff;
      }
      .btn-outline {
        background: transparent;
        border: 2px solid var(--border);
        color: var(--text);
        width: 100%;
      }
      .btn-row {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-top: 0.6rem;
        justify-content: center;
      }

      .status {
        font-size: 0.82rem;
        color: var(--muted);
        margin-top: 0.5rem;
        line-height: 1.5;
        text-align: center;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .room-code {
        font-size: 2rem;
        font-weight: 900;
        letter-spacing: 0.15em;
        color: var(--accent);
      }
      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.6rem;
      }
      .hidden {
        display: none !important;
      }

      /* Waiting */
      .waiting-msg {
        text-align: center;
        padding: 1.5rem 0;
      }
      .waiting-msg .icon {
        font-size: 2.5rem;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.1);
        }
      }
      .waiting-msg .text {
        margin-top: 0.5rem;
        font-size: 0.9rem;
        color: var(--muted);
      }

      /* Scoreboard */
      .scoreboard {
        display: flex;
        align-items: center;
        justify-content: space-between;
        background: var(--card);
        border-radius: 16px;
        padding: 1rem 1.25rem;
        margin-bottom: 0.75rem;
        border: 1px solid var(--border);
      }
      .sc-side {
        text-align: center;
        flex: 1;
      }
      .sc-label {
        font-size: 0.68rem;
        color: var(--muted);
        letter-spacing: 0.08em;
        font-weight: 700;
      }
      .sc-val {
        font-size: 2.4rem;
        font-weight: 900;
        line-height: 1.1;
      }
      .sc-val.p1c {
        color: var(--p1);
      }
      .sc-val.p2c {
        color: var(--p2);
      }
      .sc-sep {
        font-size: 1.2rem;
        color: var(--muted);
      }
      .sets-info {
        text-align: center;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
        font-weight: 700;
      }

      /* Values */
      .values-display {
        background: linear-gradient(135deg, #312e81, #1e1b4b);
        border: 2px solid var(--accent);
        border-radius: 14px;
        padding: 0.9rem 1rem;
        margin-bottom: 0.75rem;
        text-align: center;
      }
      .values-display.sd {
        border-color: var(--p2);
        background: linear-gradient(135deg, #450a0a, #1e1b4b);
      }
      .values-title {
        font-size: 0.72rem;
        color: var(--accent);
        font-weight: 800;
        letter-spacing: 0.1em;
        margin-bottom: 0.5rem;
      }
      .values-row {
        display: flex;
        justify-content: center;
        gap: 1.2rem;
      }
      .val-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.2rem;
      }
      .val-emoji {
        font-size: 1.6rem;
      }
      .val-num {
        font-size: 1.4rem;
        font-weight: 900;
        color: var(--accent);
      }
      .sd-label {
        font-size: 1.1rem;
        font-weight: 900;
        color: var(--p2);
      }

      /* Hand buttons */
      .hand-section {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 0.75rem;
      }
      .hand-title {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 0.6rem;
      }
      .hand-row {
        display: flex;
        gap: 0.6rem;
      }
      .hand-btn {
        flex: 1;
        padding: 0.9rem 0.3rem;
        border: 2px solid var(--border);
        border-radius: 14px;
        background: transparent;
        color: var(--text);
        font-family: inherit;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.25rem;
        transition: all 0.12s;
        position: relative;
      }
      .hand-btn:hover {
        border-color: var(--accent);
        background: rgba(245, 158, 11, 0.08);
      }
      .hand-btn:active {
        transform: scale(0.95);
      }
      .hand-btn:disabled {
        opacity: 0.3;
        cursor: not-allowed;
      }
      .hand-btn .emoji {
        font-size: 2rem;
      }
      .hand-btn .lbl {
        font-size: 0.72rem;
        font-weight: 700;
      }
      .hand-btn .val-badge {
        position: absolute;
        bottom: -10px;
        left: -10px;
        background: var(--accent);
        color: #000;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        transition: all 0.15s;
      }
      .hand-btn .val-badge[data-val="1"] {
        width: 30px;
        height: 30px;
        font-size: 1.04rem;
      }
      .hand-btn .val-badge[data-val="2"] {
        width: 34px;
        height: 34px;
        font-size: 1.2rem;
      }
      .hand-btn .val-badge[data-val="3"] {
        width: 40px;
        height: 40px;
        font-size: 1.44rem;
      }
      .hand-btn.best {
        border-color: var(--green);
      }
      .hand-btn.worst {
        border-color: var(--p2);
      }
      .hand-btn.selected {
        border-color: var(--pri);
        background: rgba(99, 102, 241, 0.15);
      }

      /* Result */
      .result-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        margin-bottom: 0.75rem;
        display: none;
      }
      .result-panel.show {
        display: block;
        animation: fadein 0.2s ease-out;
      }
      @keyframes fadein {
        from {
          opacity: 0;
          transform: translateY(8px);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .result-hands {
        display: flex;
        justify-content: center;
        align-items: center;
        gap: 1rem;
        font-size: 2.8rem;
        margin-bottom: 0.5rem;
        overflow: visible;
      }
      .result-hand-wrap {
        position: relative;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .result-hand-p1,
      .result-hand-p2 {
        display: inline-block;
        opacity: 0;
      }
      .result-hand-p1.animate {
        animation: slideFromLeft 0.3s ease-out forwards;
      }
      .result-hand-p2.animate {
        animation: slideFromRight 0.3s ease-out forwards;
      }
      @keyframes slideFromLeft {
        from {
          opacity: 0;
          transform: translateX(-80px) scale(1.4);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }
      @keyframes slideFromRight {
        from {
          opacity: 0;
          transform: translateX(80px) scale(1.4);
        }
        to {
          opacity: 1;
          transform: translateX(0) scale(1);
        }
      }
      .pts-pop {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        font-size: 1.4rem;
        font-weight: 900;
        opacity: 0;
        pointer-events: none;
        text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        white-space: nowrap;
      }
      .pts-pop.p1-pop {
        color: var(--p1);
        right: 100%;
        margin-right: 6px;
      }
      .pts-pop.p2-pop {
        color: var(--p2);
        left: 100%;
        margin-left: 6px;
      }
      .pts-pop.pop {
        animation: ptsPop 0.6s ease-out forwards;
      }
      @keyframes ptsPop {
        0% {
          opacity: 0;
          transform: translateY(-50%) scale(0.5);
        }
        40% {
          opacity: 1;
          transform: translateY(-50%) scale(1.3);
        }
        100% {
          opacity: 1;
          transform: translateY(-50%) scale(1);
        }
      }
      .result-vs {
        font-size: 0.9rem;
        color: var(--muted);
        font-weight: 800;
      }
      .result-text {
        text-align: center;
        font-size: 1.2rem;
        font-weight: 900;
        margin-bottom: 0.4rem;
        opacity: 0;
        transition: opacity 0.2s;
      }
      .result-text.reveal {
        opacity: 1;
      }
      .result-text.win {
        color: var(--p1);
      }
      .result-text.lose {
        color: var(--p2);
      }
      .result-text.draw {
        color: var(--accent);
      }
      .result-detail {
        opacity: 0;
        transition: opacity 0.25s;
        font-size: 1.3rem;
        font-weight: 900;
        margin-top: 0.4rem;
        text-align: center;
      }
      .result-detail.reveal {
        opacity: 1;
      }
      .pts-you {
        color: var(--p1);
      }
      .pts-cpu {
        color: var(--p2);
      }
      .pts-sep {
        color: var(--muted);
        margin: 0 0.3rem;
      }

      .next-btn {
        display: block;
        width: 100%;
        padding: 0.85rem;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #000;
        font-family: inherit;
        font-size: 0.95rem;
        font-weight: 800;
        cursor: pointer;
        transition: transform 0.1s;
      }
      .next-btn:active {
        transform: scale(0.97);
      }

      .wait-opponent {
        text-align: center;
        padding: 1rem;
        font-size: 0.9rem;
        color: var(--muted);
      }
      .wait-opponent .spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 3px solid var(--border);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-right: 0.5rem;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* History */
      .history {
        margin-top: 0.75rem;
      }
      .history-title {
        font-size: 0.78rem;
        color: var(--muted);
        font-weight: 700;
        margin-bottom: 0.4rem;
      }
      .history-list {
        display: grid;
        gap: 0.3rem;
        max-height: 180px;
        overflow-y: auto;
      }
      .hist-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(255, 255, 255, 0.03);
        border-radius: 8px;
        padding: 0.35rem 0.6rem;
        font-size: 0.78rem;
      }
      .hist-turn {
        color: var(--muted);
        min-width: 2rem;
        font-weight: 700;
      }
      .hist-hands {
        flex: 1;
      }
      .hist-pts {
        font-weight: 700;
      }
      .hist-pts .p1p {
        color: var(--p1);
      }
      .hist-pts .p2p {
        color: var(--p2);
      }

      /* Overlay */
      .overlay {
        text-align: center;
        padding: 2rem 1rem;
        display: none;
      }
      .overlay.show {
        display: block;
        animation: fadein 0.25s ease-out;
      }
      .overlay .icon {
        font-size: 3.5rem;
      }
      .overlay .msg {
        font-size: 1.5rem;
        font-weight: 900;
        margin: 0.5rem 0;
      }
      .overlay .msg.p1w {
        color: var(--p1);
      }
      .overlay .msg.p2w {
        color: var(--p2);
      }
      .overlay .sub {
        color: var(--muted);
        font-size: 0.88rem;
        margin-bottom: 1rem;
      }
      .ov-btn {
        padding: 0.7rem 1.8rem;
        border: none;
        border-radius: 12px;
        background: var(--accent);
        color: #000;
        font-family: inherit;
        font-size: 0.92rem;
        font-weight: 800;
        cursor: pointer;
        margin: 0.3rem;
      }

      .conn-bar {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.75rem;
        color: var(--muted);
        margin-bottom: 0.5rem;
      }
      .conn-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
      }
      .conn-dot.on {
        background: var(--green);
      }
      .conn-dot.off {
        background: var(--p2);
      }

      /* QR Modal */
      .modal-backdrop {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.75);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        z-index: 200;
      }
      .modal {
        width: min(440px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 1rem;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      }
      .modal-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.6rem;
      }
      .modal-head .title {
        font-size: 0.95rem;
        font-weight: 800;
        color: var(--accent);
        margin: 0;
      }
      .qr-wrap {
        display: flex;
        justify-content: center;
        margin: 0.7rem 0;
      }
      .qr-wrap img {
        width: min(280px, 70vw);
        height: auto;
        border-radius: 10px;
        background: #fff;
        padding: 8px;
      }
      .url-box {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 0.5rem;
        font-size: 0.72rem;
        color: var(--muted);
        white-space: nowrap;
        overflow-x: auto;
        background: rgba(0, 0, 0, 0.3);
      }
      .share-btns {
        display: flex;
        gap: 0.4rem;
        margin-top: 0.6rem;
      }
    </style>
  </head>
  <body>
    <header>
      <h1 id="header-title">アルティメットじゃんけん</h1>
      <span class="badge" id="header-badge">WS ONLINE</span>
    </header>

    <div class="container">
      <!-- ============== ホーム画面 ============== -->
      <div id="home-screen">
        <!-- Entry Section -->
        <div class="section" id="entry-section">
          <div class="section-title">オンライン対戦</div>
          <div class="input-full">
            <input id="display-name" placeholder="表示名（例: たいよう）" />
          </div>

          <div
            style="
              margin-top: 1rem;
              border-top: 1px solid var(--border);
              padding-top: 1rem;
            "
          >
            <div
              style="
                font-size: 0.8rem;
                margin-bottom: 0.4rem;
                color: var(--muted);
              "
            >
              ランダムマッチですぐ遊ぶ
            </div>
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem"
            >
              <button class="btn-pri" id="btn-rand-bo1">BO1 (1本先取)</button>
              <button class="btn-pri" id="btn-rand-bo3">BO3 (2本先取)</button>
            </div>
          </div>

          <div
            style="
              margin-top: 1rem;
              border-top: 1px solid var(--border);
              padding-top: 1rem;
            "
          >
            <div
              style="
                font-size: 0.8rem;
                margin-bottom: 0.4rem;
                color: var(--muted);
              "
            >
              友達と遊ぶ (ルーム作成)
            </div>
            <div
              style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem"
            >
              <button class="btn-outline" id="btn-create-bo1">BO1で作成</button>
              <button class="btn-outline" id="btn-create-bo3">BO3で作成</button>
            </div>
          </div>

          <div
            style="
              margin-top: 1rem;
              border-top: 1px solid var(--border);
              padding-top: 1rem;
            "
          >
            <div
              style="
                font-size: 0.8rem;
                margin-bottom: 0.4rem;
                color: var(--muted);
              "
            >
              ルームに参加
            </div>
            <div style="display: flex; gap: 0.4rem">
              <input
                id="join-code"
                class="mono"
                placeholder="ルームコード（6文字）"
                maxlength="6"
                style="flex: 1"
              />
              <button class="btn-accent" id="btn-join">参加</button>
            </div>
          </div>
          <div class="status" id="entry-status">
            サーバーに接続しています...
          </div>
        </div>

        <!-- Lobby Section -->
        <div class="section hidden" id="lobby-section">
          <div class="section-head">
            <div>
              <div style="font-size: 0.72rem; color: var(--muted)">
                ルームコード
              </div>
              <div class="room-code mono" id="room-code-display">------</div>
            </div>
            <button
              class="btn-danger"
              id="leave-lobby"
              style="font-size: 0.78rem"
            >
              退出
            </button>
          </div>
          <div class="waiting-msg" id="waiting-msg">
            <div class="icon">⏳</div>
            <div class="text">
              対戦相手を待っています...<br />ルームコードを相手に伝えてください
            </div>
          </div>
          <div class="btn-row hidden" id="qr-btn-row">
            <button class="btn-accent" id="show-qr">QRで招待</button>
            <button class="btn-outline" id="copy-link">URLコピー</button>
          </div>
        </div>

        <!-- QR Modal -->
        <div class="modal-backdrop hidden" id="qr-modal">
          <div class="modal">
            <div class="modal-head">
              <div class="title">招待QR</div>
              <button
                class="btn-danger"
                id="close-qr"
                style="font-size: 0.78rem; padding: 0.35rem 0.7rem"
              >
                閉じる
              </button>
            </div>
            <div
              style="
                font-size: 0.78rem;
                color: var(--muted);
                margin-bottom: 0.4rem;
              "
            >
              相手のカメラで読み取ってもらえばOK。
            </div>
            <div class="qr-wrap"><img id="qr-img" alt="QR" /></div>
            <div class="url-box mono" id="qr-url"></div>
            <div class="share-btns">
              <button class="btn-pri" id="copy-qr-url">URLをコピー</button>
            </div>
          </div>
        </div>
        <!-- ============== /ホーム画面 ============== -->
      </div>
      <!-- /#home-screen -->

      <!-- ============== 対戦画面 ============== -->
      <!-- Game Area -->
      <div id="game-area" class="hidden">
        <div
          id="battle-screen-label"
          style="
            text-align: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--p2);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
          "
        >
          ⚔️ 対戦中
        </div>
        <div class="section-head">
          <div class="conn-bar" style="margin: 0">
            <span class="conn-dot on"></span><span id="my-name">YOU</span>
            <span style="margin: 0 0.3rem">vs</span>
            <span class="conn-dot on" id="opp-dot"></span
            ><span id="opp-name">相手</span>
          </div>
          <button
            class="btn-danger"
            id="leave-game"
            style="font-size: 0.75rem; padding: 0.3rem 0.6rem"
          >
            退出
          </button>
        </div>

        <div class="sets-info" id="sets-info"></div>

        <div class="scoreboard">
          <div class="sc-side">
            <div class="sc-label" id="sc-label-me">YOU</div>
            <div class="sc-val p1c" id="score-me">0</div>
          </div>
          <div class="sc-sep">:</div>
          <div class="sc-side">
            <div class="sc-label" id="sc-label-opp">相手</div>
            <div class="sc-val p2c" id="score-opp">0</div>
          </div>
        </div>

        <div class="values-display" id="values-display">
          <div class="values-title" id="values-title">TURN 1 - VALUES</div>
          <div class="values-row" id="values-row"></div>
        </div>

        <div class="hand-section" id="hand-section">
          <div class="hand-title">手を選んでください</div>
          <div class="hand-row" id="hand-row">
            <button class="hand-btn" data-hand="0">
              <span class="val-badge" id="vb-0"></span
              ><span class="emoji">✊</span><span class="lbl">グー</span>
            </button>
            <button class="hand-btn" data-hand="1">
              <span class="val-badge" id="vb-1"></span
              ><span class="emoji">✌️</span><span class="lbl">チョキ</span>
            </button>
            <button class="hand-btn" data-hand="2">
              <span class="val-badge" id="vb-2"></span
              ><span class="emoji">✋</span><span class="lbl">パー</span>
            </button>
          </div>
        </div>

        <div class="wait-opponent hidden" id="wait-submit">
          <span class="spinner"></span>通信中...
        </div>

        <div class="result-panel" id="result-panel">
          <div class="result-hands">
            <span class="result-hand-wrap"
              ><span class="result-hand-p1" id="res-h1"></span
              ><span class="pts-pop p1-pop" id="pop-p1"></span
            ></span>
            <span class="result-vs">VS</span>
            <span class="result-hand-wrap"
              ><span class="result-hand-p2" id="res-h2"></span
              ><span class="pts-pop p2-pop" id="pop-p2"></span
            ></span>
          </div>
          <div class="result-text" id="res-text"></div>
          <div class="result-detail" id="res-detail"></div>
        </div>

        <button class="next-btn hidden" id="next-btn">次のターン →</button>

        <div class="history">
          <div class="history-title">対戦ログ</div>
          <div class="history-list" id="history-list"></div>
        </div>

        <div class="overlay" id="set-over">
          <div class="icon" id="so-icon"></div>
          <div class="msg" id="so-msg"></div>
          <div class="sub" id="so-sub"></div>
          <button class="ov-btn" id="so-btn">次のセットへ</button>
        </div>

        <div class="overlay" id="match-over">
          <div class="icon" id="mo-icon"></div>
          <div class="msg" id="mo-msg"></div>
          <div class="sub" id="mo-sub"></div>
          <button class="ov-btn" id="mo-rematch">リマッチ</button>
          <button
            class="ov-btn"
            id="mo-leave"
            style="background: var(--border); color: var(--text)"
          >
            退出
          </button>
        </div>
      </div>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);
      const HAND_EMOJI = ["✊", "✌️", "✋"];
      let ws = null;
      let mySubmitted = false;
      let currentTurn = 1;
      let currentRoomId = null;

      // URLパラメータからルームコードを取得
      const params = new URLSearchParams(location.search);
      if (params.has("room")) {
        $("join-code").value = params.get("room").toUpperCase();
      }

      // QR・リンク共有URL生成
      function buildInviteUrl(roomId) {
        const base = `${location.origin}${location.pathname}`;
        const p = new URLSearchParams();
        if (roomId) p.set("room", roomId);
        return `${base}?${p.toString()}`;
      }

      // WebSocket 接続初期化
      function connectWS() {
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const wsUrl = `wss://janken-project-back.onrender.com/ws`;
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          $("entry-status").textContent = "✅ サーバーに接続しました。";
          $("entry-status").style.color = "var(--green)";
          document
            .querySelectorAll("#entry-section button")
            .forEach((b) => (b.disabled = false));
        };

        ws.onmessage = (e) => {
          const data = JSON.parse(e.data);
          handleMessage(data);
        };

        ws.onclose = () => {
          $("entry-status").textContent =
            "❌ サーバーとの接続が切れました。リロードしてください。";
          $("entry-status").style.color = "var(--p2)";
          document
            .querySelectorAll("button")
            .forEach((b) => (b.disabled = true));
        };
      }

      document
        .querySelectorAll("#entry-section button")
        .forEach((b) => (b.disabled = true));
      connectWS();

      // === メッセージハンドリング ===
      function handleMessage(data) {
        switch (data.type) {
          case "waiting_random":
            $("entry-section").classList.add("hidden");
            $("lobby-section").classList.remove("hidden");
            $("room-code-display").textContent = "RANDOM";
            $("waiting-msg").innerHTML =
              '<div class="icon">🔍</div><div class="text">対戦相手を探しています...</div>';
            $("qr-btn-row").classList.add("hidden");
            break;

          case "room_created":
            $("entry-section").classList.add("hidden");
            $("lobby-section").classList.remove("hidden");
            currentRoomId = data.roomId;
            $("room-code-display").textContent = data.roomId;
            $("qr-btn-row").classList.remove("hidden");
            break;

          case "game_start":
            $("opp-name").textContent = data.oppName;
            $("sc-label-opp").textContent = data.oppName;
            $("waiting-msg").innerHTML =
              '<div class="icon">🎮</div><div class="text">対戦相手が見つかりました！まもなく開始...</div>';
            $("qr-btn-row").classList.add("hidden");
            break;

          case "state_sync":
            syncState(data.state);
            break;

          case "turn_result":
            resolveResult(data);
            break;

          case "wait_opponent_next":
            $("wait-submit").classList.remove("hidden");
            $("wait-submit").innerHTML =
              '<span class="spinner"></span>相手の準備を待っています...';
            break;

          case "opponent_disconnected":
            alert("対戦相手との接続が切れました。");
            location.reload();
            break;

          case "error":
            $("entry-status").textContent = "❌ " + data.message;
            $("entry-status").style.color = "var(--p2)";
            break;
        }
      }

      // === 送信アクション ===
      const getName = () => $("display-name").value.trim() || "Player";
      $("btn-rand-bo1").onclick = () =>
        ws.send(
          JSON.stringify({ type: "join_random", bo: 1, name: getName() }),
        );
      $("btn-rand-bo3").onclick = () =>
        ws.send(
          JSON.stringify({ type: "join_random", bo: 3, name: getName() }),
        );
      $("btn-create-bo1").onclick = () =>
        ws.send(
          JSON.stringify({ type: "create_room", bo: 1, name: getName() }),
        );
      $("btn-create-bo3").onclick = () =>
        ws.send(
          JSON.stringify({ type: "create_room", bo: 3, name: getName() }),
        );
      $("btn-join").onclick = () => {
        const code = $("join-code").value.trim().toUpperCase();
        if (code.length === 6)
          ws.send(
            JSON.stringify({
              type: "join_room",
              roomId: code,
              name: getName(),
            }),
          );
        else $("entry-status").textContent = "6文字のコードを入力してください";
      };

      // QRコード機能
      $("show-qr").onclick = () => {
        if (!currentRoomId) return;
        const url = buildInviteUrl(currentRoomId);
        const qrSrc = `https://api.qrserver.com/v1/create-qr-code/?size=320x320&data=${encodeURIComponent(url)}`;
        $("qr-img").src = qrSrc;
        $("qr-url").textContent = url;
        $("qr-modal").classList.remove("hidden");
      };
      $("close-qr").onclick = () => $("qr-modal").classList.add("hidden");

      $("copy-link").onclick = async () => {
        if (!currentRoomId) return;
        const url = buildInviteUrl(currentRoomId);
        try {
          await navigator.clipboard.writeText(url);
          alert("URLをコピーしました");
        } catch (e) {}
      };
      $("copy-qr-url").onclick = async () => {
        const url = $("qr-url").textContent;
        try {
          await navigator.clipboard.writeText(url);
          alert("URLをコピーしました");
        } catch (e) {}
      };

      $("leave-lobby").onclick = () => location.reload();
      $("leave-game").onclick = () => location.reload();
      $("mo-leave").onclick = () => location.reload();

      function submitHand(hand) {
        if (mySubmitted) return;
        mySubmitted = true;
        document.querySelectorAll(".hand-btn").forEach((btn) => {
          btn.disabled = true;
          if (parseInt(btn.dataset.hand) === hand)
            btn.classList.add("selected");
        });
        ws.send(JSON.stringify({ type: "submit_hand", hand }));
        $("wait-submit").classList.remove("hidden");
        $("wait-submit").innerHTML =
          '<span class="spinner"></span>相手の提出を待っています...';
      }
      document
        .querySelectorAll(".hand-btn")
        .forEach(
          (btn) => (btn.onclick = () => submitHand(parseInt(btn.dataset.hand))),
        );

      // === UI 同期 ===
      function syncState(state) {
        $("lobby-section").classList.add("hidden");
        $("game-area").classList.remove("hidden");
        document.body.classList.add("screen-battle");
        $("header-title").textContent = "⚔️ 対戦中";
        $("header-badge").textContent = "BATTLE";
        $("set-over").classList.remove("show");
        $("match-over").classList.remove("show");
        $("my-name").textContent = getName();
        $("sc-label-me").textContent = getName();

        currentTurn = state.turn;
        $("score-me").textContent = state.scores.me;
        $("score-opp").textContent = state.scores.opp;

        if (state.bo > 1) {
          $("sets-info").textContent =
            `SET: ${getName()} ${state.sets.me} - ${state.sets.opp} ${$("opp-name").textContent} (BO${state.bo})`;
        } else {
          $("sets-info").textContent = "";
        }

        if (
          currentTurn === 1 &&
          state.scores.me === 0 &&
          state.scores.opp === 0
        )
          $("history-list").innerHTML = "";

        mySubmitted = false;
        const values = state.values[currentTurn - 1] || [1, 2, 3];

        if (state.suddenDeath) {
          $("values-display").classList.add("sd");
          $("values-title").textContent = "SUDDEN DEATH";
          $("values-row").innerHTML =
            '<div class="sd-label">普通のじゃんけん！勝った方が勝ち</div>';
          for (let i = 0; i < 3; i++) $("vb-" + i).style.display = "none";
          document.querySelectorAll(".hand-btn").forEach((btn) => {
            btn.classList.remove("best", "worst", "selected");
            btn.disabled = false;
          });
        } else {
          $("values-display").classList.remove("sd");
          $("values-title").textContent = `TURN ${currentTurn} - VALUES`;
          $("values-row").innerHTML = values
            .map(
              (v, i) =>
                `<div class="val-item"><span class="val-emoji">${HAND_EMOJI[i]}</span><span class="val-num">${v}</span></div>`,
            )
            .join("");
          const maxVal = Math.max(...values),
            minVal = Math.min(...values);
          document.querySelectorAll(".hand-btn").forEach((btn) => {
            const h = parseInt(btn.dataset.hand);
            btn.classList.remove("best", "worst", "selected");
            btn.disabled = false;
            if (values[h] === maxVal) btn.classList.add("best");
            if (values[h] === minVal) btn.classList.add("worst");
            $("vb-" + h).textContent = values[h];
            $("vb-" + h).setAttribute("data-val", values[h]);
            $("vb-" + h).style.display = "";
          });
        }
        $("hand-section").classList.remove("hidden");
        $("result-panel").classList.remove("show");
        $("next-btn").classList.add("hidden");
        $("wait-submit").classList.add("hidden");
      }

      // === 結果表示 ===
      function resolveResult(data) {
        $("wait-submit").classList.add("hidden");
        $("hand-section").classList.add("hidden");

        const {
          myHand,
          oppHand,
          myPts,
          oppPts,
          result,
          suddenDeath,
          isSetOver,
          isMatchOver,
          iWonSet,
          iWonMatch,
          newScores,
        } = data;
        const rh1 = $("res-h1"),
          rh2 = $("res-h2");

        rh1.classList.remove("animate");
        rh2.classList.remove("animate");
        $("res-text").classList.remove("reveal");
        $("res-detail").classList.remove("reveal");
        $("pop-p1").classList.remove("pop");
        $("pop-p1").textContent = "";
        $("pop-p2").classList.remove("pop");
        $("pop-p2").textContent = "";

        rh1.textContent = HAND_EMOJI[myHand];
        rh2.textContent = HAND_EMOJI[oppHand];
        $("result-panel").classList.add("show");

        requestAnimationFrame(() => {
          rh1.classList.add("animate");
          setTimeout(() => rh2.classList.add("animate"), 250);
        });

        setTimeout(() => {
          if (!suddenDeath) {
            if (result === 1 || result === 0) {
              $("pop-p1").textContent = "+" + myPts;
              $("pop-p1").classList.add("pop");
            }
            if (result === -1 || result === 0) {
              $("pop-p2").textContent = "+" + oppPts;
              $("pop-p2").classList.add("pop");
            }
          }
        }, 600);

        setTimeout(() => {
          let resLabel =
            result === 1 ? "WIN!" : result === -1 ? "LOSE" : "DRAW";
          let resClass = result === 1 ? "win" : result === -1 ? "lose" : "draw";
          $("res-text").textContent = resLabel;
          $("res-text").className = "result-text " + resClass + " reveal";

          if (suddenDeath)
            $("res-detail").textContent =
              result === 0 ? "あいこ！もう一度" : "";
          else
            $("res-detail").innerHTML =
              `<span class="pts-you">YOU +${myPts}</span><span class="pts-sep">/</span><span class="pts-cpu">相手 +${oppPts}</span>`;
          $("res-detail").classList.add("reveal");

          $("score-me").textContent = newScores.me;
          $("score-opp").textContent = newScores.opp;

          const row = document.createElement("div");
          row.className = "hist-row";
          row.innerHTML = `<span class="hist-turn">T${currentTurn}</span><span class="hist-hands">${HAND_EMOJI[myHand]} vs ${HAND_EMOJI[oppHand]}</span><span class="hist-pts"><span class="p1p">+${myPts}</span> / <span class="p2p">+${oppPts}</span></span>`;
          $("history-list").prepend(row);

          if (isMatchOver) {
            setTimeout(() => {
              $("mo-icon").textContent = iWonMatch ? "🏆" : "💀";
              $("mo-msg").textContent = iWonMatch ? "YOU WIN!" : "YOU LOSE";
              $("mo-msg").className = "msg " + (iWonMatch ? "p1w" : "p2w");
              $("mo-sub").textContent =
                $("sets-info").textContent ||
                `${newScores.me} - ${newScores.opp}`;
              $("match-over").classList.add("show");
            }, 800);
          } else if (isSetOver) {
            setTimeout(() => {
              $("so-icon").textContent = iWonSet ? "✨" : "😤";
              $("so-msg").textContent = iWonSet ? "SET WIN!" : "SET LOSE";
              $("so-msg").className = "msg " + (iWonSet ? "p1w" : "p2w");
              $("so-sub").textContent = `${newScores.me} - ${newScores.opp}`;
              $("set-over").classList.add("show");
            }, 800);
          } else {
            $("next-btn").classList.remove("hidden");
          }
        }, 1300);
      }

      $("next-btn").onclick = () => {
        $("next-btn").classList.add("hidden");
        ws.send(JSON.stringify({ type: "next_turn" }));
      };
      $("so-btn").onclick = () => {
        $("set-over").classList.remove("show");
        ws.send(JSON.stringify({ type: "next_set" }));
      };
      $("mo-rematch").onclick = () => {
        $("match-over").classList.remove("show");
        ws.send(JSON.stringify({ type: "rematch" }));
      };
    </script>
  </body>
</html>
