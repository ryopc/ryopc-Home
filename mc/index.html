<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイクラサーバー接続情報</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #121214;
            color: #e3e3e6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background-color: #1a1a1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #2a2a30;
        }
        h1 {
            font-size: 20px;
            margin-bottom: 25px;
            color: #4caf50;
        }
        .info-box {
            background-color: #26262b;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            text-align: left;
            position: relative;
        }
        .label {
            font-size: 12px;
            color: #8a8a93;
            text-transform: uppercase;
            margin-bottom: 5px;
        }
        .value {
            font-size: 16px;
            font-family: monospace;
            font-weight: bold;
            color: #ffffff;
            word-break: break-all;
        }
        .notice {
            font-size: 12px;
            color: #ff9800;
            margin-top: 20px;
            line-height: 1.6;
            text-align: left;
            border-top: 1px solid #2a2a30;
            padding-top: 15px;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎮 マイクラサーバー接続情報 🎮</h1>
    
    <div class="info-box">
        <div class="label">サーバー名</div>
        <div class="value">ryopc</div>
    </div>

    <div class="info-box">
        <div class="label">サーバーアドレス (IP)</div>
        <div class="value">protea.seedloaf.com</div>
    </div>

    <div class="info-box">
        <div class="label">ポート番号 (Port)</div>
        <div class="value">49338</div>
    </div>

    <div class="notice">
        ⚠️ <strong>注意：</strong>誰もいないとサーバーは自動でスリープします。入れない時は、マイクラの画面で「参加」を何度か連打すると自動で起動します！
    </div>
</div>

</body>
</html>
