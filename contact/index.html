<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - ryopc.org</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: linear-gradient(135deg, #0d1b2a 0%, #1a3a52 100%);
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(13, 27, 42, 0.8);
            border: 2px solid #00d4ff;
            border-radius: 8px;
            padding: 40px;
            backdrop-filter: blur(10px);
        }
        h1 {
            color: #00d4ff;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #00d4ff;
            font-weight: 500;
        }
        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #00d4ff;
            background: rgba(0, 212, 255, 0.05);
            color: #fff;
            border-radius: 4px;
            font-family: inherit;
            font-size: 14px;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #00f0ff;
            box-shadow: 0 0 8px rgba(0, 212, 255, 0.3);
        }
        textarea {
            resize: vertical;
            min-height: 150px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #00d4ff;
            color: #0d1b2a;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: #00f0ff;
            transform: translateY(-2px);
        }
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            display: none;
        }
        .message.success {
            background: rgba(0, 212, 255, 0.2);
            border: 1px solid #00d4ff;
            color: #00d4ff;
        }
        .message.error {
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid #ff0000;
            color: #ff6b6b;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>💬 Contact</h1>
        <form id="contactForm">
            <div class="form-group">
                <label for="name">お名前 *</label>
                <input type="text" id="name" name="name" required>
            </div>

            <div class="form-group">
                <label for="email">メールアドレス</label>
                <input type="email" id="email" name="email">
            </div>

            <div class="form-group">
                <label for="category">お問い合わせの種類 *</label>
                <select id="category" name="category" required>
                    <option value="1">質問</option>
                    <option value="2">機能要望</option>
                    <option value="3">バグ報告</option>
                    <option value="4">その他</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">メッセージ *</label>
                <textarea id="message" name="message" required></textarea>
            </div>

            <button type="submit">送信</button>

            <div id="message" class="message"></div>
        </form>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData(document.getElementById('contactForm'));
            const messageEl = document.getElementById('message');

            try {
                const response = await fetch('https://ryopc.org/api/contact/', {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                messageEl.textContent = data.message;
                messageEl.className = 'message ' + (data.success ? 'success' : 'error');
                messageEl.style.display = 'block';

                if (data.success) {
                    document.getElementById('contactForm').reset();
                    setTimeout(() => {
                        messageEl.style.display = 'none';
                    }, 5000);
                }
            } catch (error) {
                messageEl.textContent = 'エラーが発生しました';
                messageEl.className = 'message error';
                messageEl.style.display = 'block';
            }
        });
    </script>
</body>
</html>
