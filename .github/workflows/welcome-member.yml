name: Welcome New Member

on:
  pull_request:
    types: [closed]
    paths:
      - "member.json"

jobs:
  welcome:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Post welcome message
        uses: actions/github-script@v7
        with:
          script: |
            const prAuthor = context.payload.pull_request.user.login;
            const message = `## 🎉 Welcome to ryopc Global Digital Support! 🚀\n\n` +
                            `Hi @${prAuthor}, your Pull Request has been successfully merged!\n\n` +
                            `Thank you for adding your info to \`member.json\` and joining our mission to ensure global digital equity. We are thrilled to have you as part of the team. 🤝\n\n` +
                            `*“Ensuring global digital equity, one device at a time.” — ryopcCEO*`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: message
            });
