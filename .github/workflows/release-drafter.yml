name: Release Auto Bump and Publish

on:
  push:
    branches:
      - main

jobs:
  # 🛠️ 1つ目の仕事：すべてのプッシュで必ずテストとフォーマットを自動実行します
  test_and_format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ">=18.18.0"
          cache: "npm" # 2回目以降の実行を爆速にします

      - name: Install dependencies
        run: npm ci

      # package.json にある format と test を実行してコードをチェックします
      - name: Run Format and Test
        run: |
          npm run format
          npm run test

  # 🚀 2つ目の仕事：テストが成功し、かつキーワードがある時だけリリースとバージョン更新を行います
  build_and_release:
    needs: test_and_format # 💡 上のテストが「大成功」した時だけこの処理に進みます
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          fetch-depth: 20

      - name: Check for Release Keywords
        id: check
        run: |
          COMMIT_MSGS=$(git log -1 --pretty=%B)
          echo "=== チェック対象のコミットメッセージ ==="
          echo "$COMMIT_MSGS"
          echo "======================================="

          if echo "$COMMIT_MSGS" | grep -iqE "\[mg\]|\[mn\]|\[bg\]"; then
            echo "四角括弧付きのキーワードを発見！リリース処理を実行します。"
            echo "run_release=true" >> $GITHUB_OUTPUT
          else
            echo "キーワードがないか、括弧が付いていません。今回はスキップします。"
            echo "run_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.check.outputs.run_release == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ">=18.18.0"

      - name: Update package.json version
        if: steps.check.outputs.run_release == 'true'
        id: bump
        run: |
          COMMIT_MSGS=$(git log -1 --pretty=%B)

          BUMP_TYPE="patch"
          if echo "$COMMIT_MSGS" | grep -iq "\[mg\]"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSGS" | grep -iq "\[mn\]"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MSGS" | grep -iq "\[bg\]"; then
            BUMP_TYPE="patch"
          fi

          RAW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/^v//')

          echo "NEW_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      - name: Generate Commit Log
        if: steps.check.outputs.run_release == 'true'
        id: changelog
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT

          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log -5 --pretty=format:"- %s by @%an in %h")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s by @%an in %h" | grep -v "chore: bump version" || echo "No changes")
          fi

          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: steps.check.outputs.run_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## 🚀 What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## 🤝 New Contributors
            *Thank you so much for your contributions!* 🙌
            - @${{ github.actor }}

            ---
            **Full Changelog**: https://github.com/ryopc/ryopc-Home/compare/${{ steps.changelog.outputs.prev_tag }}...v${{ steps.bump.outputs.version }}

            ---
            ### 📂 Developer & Contributor Notes

            If you are cloning or pulling this project locally, please ensure you run a fresh dependency check and execute the test scripts to verify alignment with your local environment setup:

            ```bash
            npm install
            npm run test
            ```

            ---
            *"Ensuring global digital equity, one device at a time." — game-ryo*

      - name: Commit and Push changes
        if: steps.check.outputs.run_release == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin HEAD:main
