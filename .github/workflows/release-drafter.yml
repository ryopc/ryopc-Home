name: Release Auto Bump and Publish

on:
  push:
    branches:
      - main

jobs:
  build_and_release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          fetch-depth: 5 # 過去のコミット履歴も読めるように少し多めに取得します

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18.18.0'

      # 👇 ここを改良：直近3つ分のコミットメッセージをまとめてチェックします
      - name: Update package.json version
        id: bump
        run: |
          # 直近3つのコミットメッセージを合体させて1つのテキストにします
          COMMIT_MSGS=$(git log -3 --pretty=%B)
          echo "=== 判定対象のコミット履歴 ==="
          echo "$COMMIT_MSGS"
          echo "============================="
          
          BUMP_TYPE="patch"
          
          # 合体させたテキストからキーワードを緩く探します
          if echo "$COMMIT_MSGS" | grep -iq "mg"; then
            BUMP_TYPE="major"
            echo "キーワード 'mg' を検出：メジャーを上げます"
          elif echo "$COMMIT_MSGS" | grep -iq "mn"; then
            BUMP_TYPE="minor"
            echo "キーワード 'mn' を検出：マイナーを上げます"
          elif echo "$COMMIT_MSGS" | grep -iq "bg"; then
            BUMP_TYPE="patch"
            echo "キーワード 'bg' を検出：パッチを上げます"
          else
            echo "キーワードが見つかりません：デフォルトでパッチ（Z）を上げます"
          fi
          
          NEW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
          echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_ENV
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin HEAD:main

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          generate_release_notes: true
          draft: false
          prerelease: false
