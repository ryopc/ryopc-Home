name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # 1. 管理者トークンを使ってコードを取得
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          fetch-depth: 0 # コミットメッセージを読み取るために履歴をすべて取得します

      # 2. Release Drafterを実行して自動で正式公開
      - name: Run Release Drafter & Publish
        uses: release-drafter/release-drafter@v6
        with:
          publish: true
        env:
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      # 3. Node.jsの環境を準備
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18.18.0'

      # 4. コミットメッセージからキーワードを探して package.json のバージョンを更新
      - name: Update package.json version
        run: |
          # 今回プッシュされた最新のコミットメッセージを取得します
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "最新のコミットメッセージ: $COMMIT_MSG"
          
          # デフォルトの更新ルール（キーワードがない場合はパッチバージョンZを上げる）
          BUMP_TYPE="patch"
          
          # コミットメッセージに含まれるキーワードを判定します
          if echo "$COMMIT_MSG" | grep -iq "mg"; then
            BUMP_TYPE="major" # Xを上げる
            echo "キーワード 'mg' を検出：メジャーバージョンを上げます"
          elif echo "$COMMIT_MSG" | grep -iq "mn"; then
            BUMP_TYPE="minor" # Yを上げる
            echo "キーワード 'mn' を検出：マイナーバージョンを上げます"
          elif echo "$COMMIT_MSG" | grep -iq "bg"; then
            BUMP_TYPE="patch" # Zを上げる
            echo "キーワード 'bg' を検出：パッチバージョンを上げます"
          else
            echo "キーワードがありません：通常のパッチバージョン（Z）として処理します"
          fi
          
          # 指定したルールでpackage.jsonのバージョンを書き換えます
          npm version $BUMP_TYPE --no-git-tag-version

      # 5. 変更を main ブランチに自動でコミット・プッシュ
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version 自動更新 [skip ci]"
          git push origin HEAD:main
