name: Release Drafter

on:
  push:
    branches:
      - main

jobs:
  update_release_draft:
    permissions:
      contents: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      # 1. 管理者権限を持つトークンを使ってコードを取得します
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # 👇 ここを secrets.ADMIN_TOKEN に変更して保護ルールを突破します
          token: ${{ secrets.ADMIN_TOKEN }}

      # 2. Release Drafterを実行し、そのまま自動で正式公開します
      - name: Run Release Drafter & Publish
        uses: release-drafter/release-drafter@v6
        with:
          publish: true
        env:
          # 👇 リリース作成も管理者権限で行います
          GITHUB_TOKEN: ${{ secrets.ADMIN_TOKEN }}

      # 3. Node.jsの環境を準備します
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18.18.0'

      # 4. 公開された最新のタグ名を取得して package.json を書き換えます
      - name: Update package.json version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0)
          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          npm version $VERSION --no-git-tag-version

      # 5. 変更を main ブランチに自動でコミット・プッシュします
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to自動更新 [skip ci]"
          git push origin HEAD:main
