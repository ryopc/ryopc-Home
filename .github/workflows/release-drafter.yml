name: Release Auto Bump and Publish

on:
  push:
    branches:
      - main

jobs:
  build_and_release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      # 1. 管理者トークンを使ってコードを取得
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          fetch-depth: 10

      # 2. Node.jsの環境を準備
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '>=18.18.0'

      # 3. 現在の package.json の値から、確実に次のバージョンを計算して書き換えます
      - name: Update package.json version
        id: bump
        run: |
          COMMIT_MSGS=$(git log -5 --pretty=%B)
          echo "=== 判定対象のコミット履歴 ==="
          echo "$COMMIT_MSGS"
          echo "============================="
          
          BUMP_TYPE="patch"
          if echo "$COMMIT_MSGS" | grep -iq "mg"; then
            BUMP_TYPE="major"
          elif echo "$COMMIT_MSGS" | grep -iq "mn"; then
            BUMP_TYPE="minor"
          elif echo "$COMMIT_MSGS" | grep -iq "bg"; then
            BUMP_TYPE="patch"
          fi
          
          # 💡 ここを改良：現在のpackage.jsonをベースに確実に次のバージョンを適用して取得
          # 出力される「v1.0.17」から先頭の 'v' を確実に1つだけ削ります
          RAW_VERSION=$(npm version $BUMP_TYPE --no-git-tag-version)
          CLEAN_VERSION=$(echo "$RAW_VERSION" | sed 's/^v//')
          
          echo "NEW_VERSION=$CLEAN_VERSION" >> $GITHUB_ENV
          echo "version=$CLEAN_VERSION" >> $GITHUB_OUTPUT

      # 4. 直コミットの履歴を綺麗なテキストとして書き出します
      - name: Generate Commit Log
        id: changelog
        run: |
          git fetch --tags
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log -5 --pretty=format:"- %s by @%an in %h")
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s by @%an in %h" | grep -v "chore: bump version" || echo "No changes")
          fi
          
          echo "CHANGES<<EOF" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      # 5. 計算された綺麗なバージョン（例: v1.0.17）でGitHubリリースを作成
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ADMIN_TOKEN }}
          tag_name: v${{ steps.bump.outputs.version }}
          name: Release v${{ steps.bump.outputs.version }}
          draft: false
          prerelease: false
          body: |
            ## 🚀 What's Changed

            ${{ steps.changelog.outputs.changes }}

            ## 🤝 New Contributors
            *Thank you so much for your contributions!* 🙌
            - @${{ github.actor }}

            ---
            **Full Changelog**: https://github.com{{ steps.bump.outputs.version }}...v${{ steps.bump.outputs.version }}

            ---
            ### 📂 Developer & Contributor Notes

            If you are cloning or pulling this project locally, please ensure you run a fresh dependency check and execute the test scripts to verify alignment with your local environment setup:

            ```bash
            npm install
            npm run test
            ```

            ---
            *"Ensuring global digital equity, one device at a time." — game-ryo*

      # 6. 最後に変更を main ブランチに自動でコミット・プッシュ
      - name: Commit and Push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add package.json package-lock.json
          git commit -m "chore: bump version to ${{ env.NEW_VERSION }} [skip ci]"
          git push origin HEAD:main
