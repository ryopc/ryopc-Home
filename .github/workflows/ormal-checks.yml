name: Branch Policy - ABSOLUTE RULE
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      base_ref:
        type: string
        description: 'Base branch (e.g., main)'
        default: 'main'
      head_ref:
        type: string
        description: 'Head branch (e.g., test)'
        default: 'test'

jobs:
  enforce-branch-policy:
    runs-on: ubuntu-latest
    steps:
      - name: Block test → main PR (UNBYPASSABLE)
        run: |
          BASE_REF="${{ github.event_name == 'workflow_dispatch' && inputs.base_ref || github.base_ref }}"
          HEAD_REF="${{ github.event_name == 'workflow_dispatch' && inputs.head_ref || github.head_ref }}"
          
          if [[ "$BASE_REF" == "main" && "$HEAD_REF" == "test" ]]; then
            echo "❌ ABSOLUTE RULE: test → main PR is BLOCKED"
            echo "This rule cannot be bypassed, even by administrators"
            exit 1
          else
            echo "✅ Check passed: $HEAD_REF → $BASE_REF"
          fi
