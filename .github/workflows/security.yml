name: Security & Test
on:
  schedule:
    - cron: "0 0 * * 0" # 毎週日曜 UTC 00:00
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24."
      - run: npm ci
      - run: npm audit --audit-level=moderate
      - run: npm test
