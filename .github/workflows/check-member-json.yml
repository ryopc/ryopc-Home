name: Check member.json Syntax

on:
  pull_request:
    # どのファイルの変更でもトリガーさせて、マージブロックを防ぐ
    branches: [ main ]

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate member.json syntax
        run: |
          if [ -f member.json ]; then
            echo "Checking member.json syntax..."
            # jqで構文チェック。エラーならここで処理が落ちて不合格になります
            jq . member.json > /dev/null
            echo "✅ member.json syntax is valid!"
          else
            echo "ℹ️ member.json was not modified or found. Skipping check."
          fi
