name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"

# バージョンの自動カウントアップルール
version-resolver:
  major:
    labels:
      - "major"
      - "breaking-change"
  minor:
    labels:
      - "minor"
      - "feature"
  patch:
    labels:
      - "patch"
      - "bug"
  default: patch

# 英語の多機能テンプレート
template: |
  ## 🚀 What's Changed

  $CHANGES

  ## 🤝 New Contributors
  *Thank you so much for your contributions!* 🙌
  $CONTRIBUTORS

  ---
  **Full Changelog**: https://github.com/ryopc/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION

  ---
  ### 📂 Developer & Contributor Notes

  If you are cloning or pulling this project locally, please ensure you run a fresh dependency check and execute the test scripts to verify alignment with your local environment setup:

  ```bash
  npm install
  npm run test
  ```

  ---
  *"Ensuring global digital equity, one device at a time." — game-ryo*

# 超詳細なカテゴリ分類
categories:
  - title: "✨ New Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Bug Fixes"
    labels:
      - "bug"
      - "fix"
  - title: "🔒 Security Updates"
    labels:
      - "security"
  - title: "⚡ Performance Improvements"
    labels:
      - "performance"
      - "speed"
  - title: "🧰 Maintenance & Refactoring"
    labels:
      - "chore"
      - "refactor"
      - "dependencies"
  - title: "📝 Documentation"
    labels:
      - "documentation"
      - "docs"

# リリースノートに載せない除外設定
exclude-labels:
  - "skip-changelog"
  - "duplicate"
  - "wontfix"

# PR一行ずつの表示フォーマット
change-template: "- $TITLE by @$AUTHOR in #$NUMBER"
# 貢献者一覧の表示フォーマット
contributor-template: "- @$AUTHOR"
